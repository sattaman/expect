<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Replay Playground</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0a0a0a;
        color: #e5e5e5;
        min-height: 100vh;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 400px;
        min-height: 100vh;
      }

      .sample-area {
        padding: 48px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      .sample-area h1 {
        font-size: 24px;
        font-weight: 600;
        color: #fafafa;
      }

      .sample-area p {
        color: #a3a3a3;
        line-height: 1.6;
      }

      .interactive-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .interactive-section h2 {
        font-size: 14px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #737373;
      }

      .button-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sample-btn {
        padding: 8px 16px;
        border-radius: 6px;
        border: 1px solid #262626;
        background: #171717;
        color: #e5e5e5;
        cursor: pointer;
        font-size: 14px;
        transition: background 150ms;
      }

      .sample-btn:hover {
        background: #262626;
      }

      .sample-input {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #262626;
        background: #171717;
        color: #e5e5e5;
        font-size: 14px;
        width: 100%;
        max-width: 320px;
        outline: none;
      }

      .sample-input:focus {
        border-color: #525252;
      }

      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .counter-section {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .counter-value {
        font-size: 32px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        min-width: 48px;
        text-align: center;
        color: #fafafa;
      }

      .panel {
        border-left: 1px solid #1a1a1a;
        background: #0f0f0f;
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        padding: 16px 20px;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .panel-header h2 {
        font-size: 14px;
        font-weight: 600;
        color: #fafafa;
      }

      .event-count {
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        padding: 2px 8px;
        border-radius: 10px;
        background: #262626;
        color: #a3a3a3;
      }

      .panel-controls {
        padding: 12px 20px;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        gap: 8px;
      }

      .ctrl-btn {
        padding: 6px 12px;
        border-radius: 6px;
        border: none;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 150ms;
      }

      .ctrl-btn:hover {
        opacity: 0.85;
      }

      .ctrl-btn.primary {
        background: #2563eb;
        color: #fff;
      }

      .ctrl-btn.danger {
        background: #dc2626;
        color: #fff;
      }

      .ctrl-btn.neutral {
        background: #262626;
        color: #e5e5e5;
      }

      .event-log {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
        font-family:
          ui-monospace,
          "SF Mono",
          "Cascadia Code",
          monospace;
        font-size: 12px;
      }

      .event-entry {
        padding: 6px 20px;
        border-bottom: 1px solid #141414;
        cursor: pointer;
        transition: background 100ms;
      }

      .event-entry:hover {
        background: #171717;
      }

      .event-type {
        color: #22c55e;
        font-weight: 500;
      }

      .event-time {
        color: #525252;
        margin-left: 8px;
      }

      .event-detail {
        display: none;
        margin-top: 4px;
        padding: 8px;
        background: #141414;
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-all;
        color: #737373;
        max-height: 200px;
        overflow-y: auto;
      }

      .event-entry.expanded .event-detail {
        display: block;
      }

      .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #525252;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="sample-area">
        <div>
          <h1>Replay Playground</h1>
          <p>
            Interact with the elements below. Every DOM mutation, mouse move,
            and input change is being recorded by the rrweb runtime.
          </p>
        </div>

        <div class="interactive-section">
          <h2>Buttons</h2>
          <div class="button-group">
            <button class="sample-btn" id="btn-a">Button A</button>
            <button class="sample-btn" id="btn-b">Button B</button>
            <button class="sample-btn" id="btn-c">Button C</button>
          </div>
        </div>

        <div class="interactive-section">
          <h2>Text Input</h2>
          <input
            class="sample-input"
            id="text-input"
            type="text"
            placeholder="Type something..."
          />
        </div>

        <div class="interactive-section">
          <h2>Checkboxes</h2>
          <div class="checkbox-group">
            <label><input type="checkbox" id="check-1" /> Option one</label>
            <label><input type="checkbox" id="check-2" /> Option two</label>
            <label><input type="checkbox" id="check-3" /> Option three</label>
          </div>
        </div>

        <div class="interactive-section">
          <h2>Counter</h2>
          <div class="counter-section">
            <button class="sample-btn" id="decrement">&minus;</button>
            <span class="counter-value" id="counter-display">0</span>
            <button class="sample-btn" id="increment">+</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Recorded Events</h2>
          <span class="event-count" id="event-count">0</span>
        </div>
        <div class="panel-controls">
          <button class="ctrl-btn primary" id="ctrl-refresh">Refresh</button>
          <button class="ctrl-btn neutral" id="ctrl-drain">Drain</button>
          <button class="ctrl-btn danger" id="ctrl-clear">Clear Log</button>
        </div>
        <div class="event-log" id="event-log">
          <div class="empty-state" id="empty-state">
            Recording... interact with the page
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
